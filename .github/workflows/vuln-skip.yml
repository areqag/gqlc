# The required-check twin of vuln.yml: branch protection demands a govulncheck
# status on every PR, but the real scan is meaningless without dependency
# changes. This same-named job reports instant success exactly when vuln.yml's
# paths filter keeps the real one silent. The job name must stay identical to
# vuln.yml's — protection matches contexts by name — and the two filters must
# stay exact inverses, or PRs hang waiting for a status that never comes.
name: vuln-skip

on:
  pull_request:
    paths-ignore:
      - go.mod
      - go.sum

permissions: {}

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - run: echo "no dependency changes; the real scan lives in vuln.yml"
