# PR-blocking merge gate: boots a neo4j testcontainer and drives the generated
# repositories against it, exercising the v5 and v6 driver arms in parallel
# (bd gqlc-73h shipped the original v5-only smoke; bd gqlc-5gc added the v6
# arm sharing the same image; bd gqlc-9u5 enabled Go's test cache; bd gqlc-rvw
# promoted this to blocking). Wall-time is affordable because the Go test
# cache keeps the average PR cost near-zero — cache-miss only occurs when the
# test binary is actually invalidated, so only codegen-adjacent PRs pay the
# ~30s container-boot cost. No paths: filter — Go's test cache is the primary
# skip mechanism; adding path filters would risk false skips on new
# codegen-adjacent packages. Nightly cron on master retained as a safety net
# in case a merge-time race sneaks a codegen change past the PR gate;
# workflow_dispatch retained for developer-triggered manual iteration.
name: codegen-live

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            test/data/codegen/go.sum
      - uses: ./.github/actions/setup-just
      - run: just test-codegen-live
