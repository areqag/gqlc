# Vulnerabilities arrive with dependency changes, not parser code, so the real
# scan runs only when go.mod/go.sum change, plus a weekly sweep on master for
# newly published advisories. govulncheck IS a required check; PRs that leave
# the dependency files untouched satisfy it via the same-named no-op job in
# vuln-skip.yml, because a path-filtered required check that never reports
# would hang the merge forever.
name: vuln

on:
  pull_request:
    paths:
      - go.mod
      - go.sum
  schedule:
    - cron: "23 6 * * 1"

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-just
      - run: just vuln
