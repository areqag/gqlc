# Vulnerabilities arrive with dependency changes, not parser code, so this
# runs only when go.mod/go.sum change plus a weekly sweep on master for newly
# published advisories. Deliberately NOT a required check: a path-filtered
# workflow that does not run would hang a required-status merge forever.
name: vuln

on:
  pull_request:
    paths:
      - go.mod
      - go.sum
  schedule:
    - cron: "23 6 * * 1"

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-just
      - run: just vuln
