# tagpr opens/updates a rolling Release PR on every master push; merging that PR
# creates the v* tag, at which point GoReleaser builds and uploads binaries.
# Never a required status check: master pushes trigger this, feature PRs don't.
#
# Uses a classic PAT (secrets.TAGPR_PAT, scopes: repo + workflow). GitHub Apps
# and fine-grained PATs are architecturally blocked from creating tag refs when
# any commit in the tag's history touches .github/workflows/**, via both git
# push and the REST API. Only user-class identities (classic PATs, OAuth
# tokens, SSH deploy keys) bypass this guard. See
#   bd remember gh-workflow-file-guard-identity-based
#   bd remember gqlc-release-pat-rotation
# for the empirical proofs and the yearly rotation procedure.
name: release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TAGPR_PAT }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - id: tagpr
        uses: Songmu/tagpr@v1
        env:
          GITHUB_TOKEN: ${{ secrets.TAGPR_PAT }}

      - uses: goreleaser/goreleaser-action@v6
        if: steps.tagpr.outputs.tag != ''
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.TAGPR_PAT }}
