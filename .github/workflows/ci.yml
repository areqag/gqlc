# The always-run merge-blocking checks: lint / test / tidy / actionlint, all
# parallel, all invoking just recipes so CI runs exactly what a developer runs
# locally. Tool versions are pinned once, in the justfile.
name: ci

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

# A Graphite restack force-pushes every branch in the stack; cancel the stale
# runs instead of queueing them. Never cancel a master run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-just
      # golangci-lint's per-package analysis cache. Save under a unique key
      # every run, restore by prefix: the same rotation the official action
      # does, without giving up `just lint` as the single entrypoint. The
      # binary itself is not cached: just lint self-provisions it in ~3s,
      # about what a cache restore would cost.
      - name: golangci-lint analysis cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-${{ runner.os }}-${{ hashFiles('go.sum', '.golangci.yml') }}-${{ github.run_id }}
          restore-keys: |
            golangci-${{ runner.os }}-${{ hashFiles('go.sum', '.golangci.yml') }}-
      - run: just lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-just
      - run: just test

  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-just
      - run: just tidy-check

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: ./.github/actions/setup-just
      - run: just actionlint
