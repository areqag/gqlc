-- ============================================================
-- Sample GQL Schema: Social Network Graph
-- Validates against the GQL ANTLR grammar (GQL.g4)
-- ============================================================

CREATE PROPERTY GRAPH TYPE SocialNetworkType AS {

    -- --------------------------------------------------------
    -- NODE TYPES
    -- nodeTypePattern: (localAlias :Label { prop :: TYPE, ... })
    -- --------------------------------------------------------

    (p :Person {
        id        :: INT NOT NULL,
        name      :: STRING NOT NULL,
        email     :: VARCHAR(255),
        birthDate :: DATE,
        active    :: BOOL NOT NULL
    }),

    (post :Post {
        id        :: INT NOT NULL,
        title     :: STRING NOT NULL,
        content   :: STRING,
        createdAt :: TIMESTAMP,
        likes     :: INT
    }),

    (t :Tag {
        id   :: INT NOT NULL,
        name :: STRING NOT NULL
    }),

    -- --------------------------------------------------------
    -- EDGE TYPES
    -- edgeTypePattern (pointing right):
    --   (sourceAlias) -[edgeFiller]-> (destAlias)
    --
    -- Source/destination refs only accept a plain alias
    -- (regularIdentifier) or an inline nodeTypeFiller,
    -- NOT both together. Use the alias defined in the node
    -- type above to reference it.
    --
    -- The arc bracket -[...]-> requires an edgeTypeFiller:
    -- a label set and/or property types (cannot be empty).
    -- --------------------------------------------------------

    -- KNOWS: Person -> Person
    (p) -[:KNOWS { since :: DATE }]-> (q),

    -- AUTHORED: Person -> Post
    (p) -[:AUTHORED { publishedAt :: TIMESTAMP NOT NULL }]-> (post),

    -- TAGGED_WITH: Post -> Tag (no extra properties)
    (post) -[:TAGGED_WITH]-> (t),

    -- LIKED: Person -> Post
    (p) -[:LIKED { likedAt :: TIMESTAMP }]-> (post)

}