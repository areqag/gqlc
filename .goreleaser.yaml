version: 2

project_name: gqlc

builds:
  - main: ./cmd/gqlc
    binary: gqlc
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/areqag/gqlc/internal/version.Version={{.Version}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

changelog:
  disable: true

