version: 2

project_name: gqlc

builds:
  - main: ./cmd/gqlc
    binary: gqlc
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/areqag/gqlc/internal/version.Version={{.Version}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

changelog:
  disable: true

# Repo has immutable-releases enabled (GA 2025-10-28). Immutable releases can't
# accept asset uploads after publish. tagpr therefore creates the release as a
# draft (drafts aren't immutable yet); goreleaser uploads binaries to that draft
# and publishes it — at which point immutability locks with assets attached.
release:
  use_existing_draft: true
  draft: false

